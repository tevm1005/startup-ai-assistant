services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: startup_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 30s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      SA_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/startup_assistant
      SA_OLLAMA_BASE_URL: http://ollama:11434
      SA_LLM_MODEL: llama3.2:1b
      SA_EMBEDDING_MODEL: nomic-embed-text
      SA_DEBUG: "false"
    volumes:
      - ./data:/app/data
    stdin_open: true
    tty: true

volumes:
  pgdata:
  ollama_models:
